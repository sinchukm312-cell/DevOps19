trigger:
  - main

variables:
  imageName: 'flask-image'
  imageTag: 'latest'
  containerPort: '5000'

stages:
  - stage: Build
    displayName: Build Stage
    jobs:
      - job: BuildJob
        displayName: Build Docker Image
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          # Step 1: Checkout code
          - task: Checkout@1

          # Step 2: Install Docker (already available, but safe)
          - task: DockerInstaller@0
            inputs:
              dockerVersion: '20.10.7'

          # Step 3: Build Docker Image
          - task: Docker@2
            displayName: Build Image
            inputs:
              command: build
              Dockerfile: '**/Dockerfile'
              tags: |
                $(imageName):$(imageTag)

          # Step 4: Verify Build
          - script: |
              echo "Listing Docker Images"
              docker images
            displayName: Verify Build

  - stage: Deploy
    displayName: Deploy Stage
    dependsOn: Build
    jobs:
      - job: DeployJob
        displayName: Run Container
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          # Step 5: Run Container (for validation)
          - script: |
              docker run -d -p $(containerPort):$(containerPort) $(imageName):$(imageTag)
              echo "Container started successfully"
            displayName: Run Container